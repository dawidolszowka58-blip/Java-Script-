<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> hide() i show()</title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <h1>toggle() - ukrywa element <=> pokazuje element</h1>
    <button id="toggle">przelaczanie akapita</button>
    <p id="akapit1">Pierwszy akapit</p>
    <script>
        $( function(){
            $("#toggle").click(function() {
                $("#akapit1").toggle();
            });
        });
    </script>
</body>
</html>
