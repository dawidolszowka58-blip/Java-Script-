<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <p> Wyszukiwanie tekstu 'byc'</p>
</body>
<script> 
    let tekst ="Byc albo nie byc"
    var wzorzec = /byc/i
    var pozycja = tekst.search(wzorzec)
    document.write('Wyraz znaleziono na pozycji: ' +pozycja)
    

</script>
